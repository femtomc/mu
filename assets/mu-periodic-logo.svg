<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">mu periodic table style logo</title>
  <desc id="desc">A periodic-table-style tile with symbol mu.</desc>

  <defs>
    <linearGradient id="tile-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1c" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="28" fill="url(#tile-bg)" stroke="url(#accent)" stroke-width="14" />
  <rect x="44" y="44" width="424" height="424" rx="16" fill="none" stroke="#4ade80" stroke-opacity="0.35" stroke-width="3" />

  <text
    x="70"
    y="106"
    fill="#bbf7d0"
    font-size="46"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
